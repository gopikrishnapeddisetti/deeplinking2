name: Build and Deploy to Kubernetes
permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - prod

concurrency:
  group: build-k8s-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      APP_NAME: deeplink-server
      AWS_REGION: "${{ secrets.AWS_REGION }}"
      DOCKER_REGISTRY: "${{ secrets.DOCKER_REGISTRY }}"
      EKS_CLUSTER_NAME: "${{ secrets.EKS_CLUSTER_NAME }}"
      IMAGE_TAG: "${{ github.ref_name }}-${{ github.run_number }}-${{ github.run_attempt }}"
    steps:
      - name: twingate-pre-setup
        run: |
          echo "root ALL=(ALL) NOPASSWD:ALL" | sudo tee -a /etc/sudoers 2>/dev/null || true
          echo "deb [trusted=yes] https://packages.twingate.com/apt/ /" | sudo tee /etc/apt/sources.list.d/twingate.list
          sudo apt-get update
          sudo apt-get install -y twingate

      - name: Connect to Twingate
        env:
          TWINGATE_SERVICE_KEY: ${{ secrets.TWINGATE_SERVICE_KEY }}
        run: |
          echo "$TWINGATE_SERVICE_KEY" | base64 -d | sudo twingate setup --headless -
          sudo twingate start
          for i in {1..15}; do
            STATUS=$(twingate status 2>&1 || true)
            if echo "$STATUS" | grep -qi "online"; then
              echo "Twingate is online"
              break
            fi
            echo "Waiting for Twingate... ($i/15)"
            sleep 3
          done

      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize image tag
        run: echo "IMAGE_TAG=${IMAGE_TAG//\//-}" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: "${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}"
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy to Kubernetes
        env:
          DEEPLINK_HOST: ${{ secrets.DEEPLINK_HOST }}
        run: |
          if [[ "${{ github.ref_name_name }}" == "prod" ]]; then
            NAME_SPACE=prod
          else
            NAME_SPACE=staging
          fi
          FULL_IMAGE_NAME=$DOCKER_REGISTRY/$APP_NAME:$IMAGE_TAG
          sed -i "s|current-image-name|$FULL_IMAGE_NAME|g" k8s/deployment.yaml
          sed -i "s|deeplink-host|$DEEPLINK_HOST|g" k8s/ingress.yaml
          cat k8s/deployment.yaml
          kubectl apply -n $NAME_SPACE -f k8s/deployment.yaml
          kubectl apply -n $NAME_SPACE -f k8s/service.yaml
          kubectl apply -n $NAME_SPACE -f k8s/ingress.yaml
