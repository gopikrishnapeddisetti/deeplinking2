apiVersion: apps/v1
kind: Deployment
metadata:
  name: deeplink-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deeplink-server
  template:
    metadata:
      labels:
        app: deeplink-server
    spec:
      containers:
        - name: deeplink-server
          image: current-image-name
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
      nodeSelector:
        asgName: "application-nodes"
